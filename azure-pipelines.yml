trigger:
  - none

pool:
  vmImage: ubuntu-latest

variables:
  KEY_VAULT_NAME: "demonain111ws-kv"
  TF_WORKING_DIR: "$(System.DefaultWorkingDirectory)/infra"
  AZURE_SERVICE_CONNECTION: "Bootstrap-terraform"

stages:
  - stage: Prod
    variables:
     env: prod
    displayName: "$(env) Infrastructure"
    jobs:
      - job: TerraformPlan
        displayName: "Terraform Plan"
        strategy:
          matrix:
            coreInfra:
              component: core-infra
            service:
              component: service
            storage:
              component: storage
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'Bootstrap-terraform'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                chmod +x $(TF_WORKING_DIR)/scripts/terraform-script.sh
                cat $(env)
                $(TF_WORKING_DIR)/scripts/terraform-script.sh plan $(env) $(component)
      - job: ManualApproval
        pool: server
        dependsOn: TerraformPlan
        steps:
            - task: ManualValidation@1
              inputs:
                notifyUsers: 'gamertech996@gmail.com'
                instructions: 'Please approve deployment to production'
                onTimeout: 'reject'
                timeout: '1d'
      - job: TerraformApply
        dependsOn: ManualApproval
        steps:
           -  task: AzureCLI@2
              inputs:
                azureSubscription: 'Bootstrap-terraform'
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  chmod +x $(TF_WORKING_DIR)/scripts/terraform-script.sh
                  $(TF_WORKING_DIR)/scripts/terraform-script.sh plan $(env)
trigger:
  - main

pool:
  name: Bootstrap-azure-pipeline
  demands:
    - agent.name -equals Bootstrap-azure-pipeline

variables:
  KEY_VAULT_NAME: "demonain111ws-kv"
  TF_WORKING_DIR: "$(System.DefaultWorkingDirectory)/infra"
  AZURE_SERVICE_CONNECTION: "Bootstrap-terraform"

stages:
  - stage: Bootstrap
    displayName: "Bootstrap Infrastructure"
    jobs:
      - job: TerraformPlan
        displayName: "Terraform Plan"
        steps:

          # ── Terraform Init ─────────────────────────────────────────────────
          - task: TerraformTask@5
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: "$(System.DefaultWorkingDirectory)/infra"
              backendServiceArm: "Bootstrap-terraform"
              backendAzureRmStorageAccountName: "bootstrapsa1234"
              backendAzureRmContainerName: "bootstrap"
              backendAzureRmKey: "prod.terraform.tfstate"
          # ── Terraform Plan ─────────────────────────────────────────────────
          - task: TerraformTask@5
            inputs:
              provider: "azurerm"
              command: "plan"
              workingDirectory: "$(TF_WORKING_DIR)"
              environmentServiceNameAzureRM: "Bootstrap-terraform"
              commandOptions: '-var-file="prod.tfvars"'
      - job: ManualApproval
        pool: server
        dependsOn: TerraformPlan
        steps:
            - task: ManualValidation@1
              inputs:
                notifyUsers: 'gamertech996@gmail.com'
                instructions: 'Please approve deployment to production'
                onTimeout: 'reject'
                timeout: '1d'
      - job: TerraformApply
        dependsOn: ManualApproval
        steps:
            - task: TerraformTask@5
              inputs:
                provider: "azurerm"
                command: "init"
                workingDirectory: "$(System.DefaultWorkingDirectory)/infra"
                backendServiceArm: "Bootstrap-terraform"
                backendAzureRmStorageAccountName: "bootstrapsa1234"
                backendAzureRmContainerName: "bootstrap"
                backendAzureRmKey: "prod.terraform.tfstate"
            - task: TerraformTask@5
              inputs:
                provider: "azurerm"
                command: "apply"
                workingDirectory: "$(TF_WORKING_DIR)"
                environmentServiceNameAzureRM: "Bootstrap-terraform"
                commandOptions: '-var-file="prod.tfvars" --auto-approve'
